name: Scheduled Ingestion Cron

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch: # Enable manual run from GitHub Actions UI

jobs:
  trigger-ingestion:
    runs-on: ubuntu-latest
    steps:
      - name: Check Backend Health
        id: health_check
        run: |
          echo "Checking if News Pulse backend is reachable..."
          HTTP_STATUS=$(curl --silent --output /dev/null --write-out "%{http_code}" \
            --max-time 15 \
            --connect-timeout 10 \
            -H "Host: news-pulse.rahulbisht.me" \
            "${{ secrets.API_BASE_URL }}/health" || echo "000")
          echo "health_status=$HTTP_STATUS" >> $GITHUB_OUTPUT
          echo "Backend health check returned HTTP $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::warning::Backend is not reachable (HTTP $HTTP_STATUS). Ingestion skipped."
          fi

      - name: Trigger News Pulse Ingestion
        if: steps.health_check.outputs.health_status == '200'
        run: |
          echo "Triggering ingestion pipeline..."
          HTTP_STATUS=$(curl --silent --output /tmp/response.json --write-out "%{http_code}" \
            --max-time 30 \
            --connect-timeout 10 \
            --retry 2 \
            --retry-delay 5 \
            --retry-connrefused \
            -X POST "${{ secrets.API_BASE_URL }}/ingest/trigger" \
            -H "Host: news-pulse.rahulbisht.me" \
            -H "Content-Type: application/json" \
            -d '{"source": "github-actions-cron"}')
          echo "Trigger response HTTP $HTTP_STATUS:"
          cat /tmp/response.json || true
          echo ""
          if [ "$HTTP_STATUS" = "202" ]; then
            echo "✅ Ingestion triggered successfully (job accepted)."
          elif [ "$HTTP_STATUS" = "409" ]; then
            echo "ℹ️ Ingestion already running — skipping (HTTP 409)."
          else
            echo "::error::Unexpected response from ingestion trigger: HTTP $HTTP_STATUS"
            exit 1
          fi

      - name: Skip Notice
        if: steps.health_check.outputs.health_status != '200'
        run: |
          echo "⚠️ Ingestion skipped — backend was unreachable."
          echo "Please ensure the EC2 backend (PM2 process) is running."
          echo "SSH into EC2 and run: pm2 restart news-pulse-backend"
